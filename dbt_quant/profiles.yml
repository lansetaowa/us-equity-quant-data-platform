dbt_quant:
  target: dev


  outputs:
    dev: # 本地 DuckDB target，继续用于 CI、本地开发、快速调试
      type: duckdb
      path: "../data/dbt/quant.duckdb"
      schema: main
      threads: 4

    cloud: # BigQuery target，后续用于云端 DWS/ADS/mart
      type: bigquery
      method: oauth
      project: "{{ env_var('GCP_PROJECT_ID') }}"
      dataset: "{{ env_var('BIGQUERY_DWH_DATASET', 'quant_dwh') }}"
      location: "{{ env_var('GCP_LOCATION', 'US') }}"
      threads: 4
      priority: interactive
      retries: 1
      job_execution_timeout_seconds: 300